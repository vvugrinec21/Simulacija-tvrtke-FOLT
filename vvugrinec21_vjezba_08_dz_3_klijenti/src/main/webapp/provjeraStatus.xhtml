<ui:composition template="/predlozak.xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core">

    <f:metadata>
        <f:viewAction action="#{provjeraPosluzitelja.provjeri}" />
    </f:metadata>

    <ui:define name="title">Provjera poslužitelja</ui:define>

    <ui:define name="content">
        <h:form>
            <h:commandButton value="Provjeri rad poslužitelja" action="#{provjeraPosluzitelja.provjeri}" />
        </h:form>

        <h:panelGroup rendered="#{provjeraPosluzitelja.radi}">
            <h:outputText value="Poslužitelj radi!" style="color:green; font-weight:bold" />
        </h:panelGroup>

        <h:panelGroup rendered="#{not provjeraPosluzitelja.radi}">
            <h:outputText value="Poslužitelj ne radi!" style="color:red; font-weight:bold" />
        </h:panelGroup>
    </ui:define>

</ui:composition>
