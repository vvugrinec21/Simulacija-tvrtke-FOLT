<ui:composition template="/predlozak.xhtml"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core">

    <ui:define name="title">Registracija korisnika</ui:define>

    <ui:define name="content">
        <h:form styleClass="registracija-form">
            <div class="registracija-grid">
                <div class="form-row">
                    <h:outputLabel for="korisnickoIme" value="Korisničko ime:" />
                    <h:inputText id="korisnickoIme" value="#{registracijaKorisnika.korisnickoIme}" required="true"
                                 requiredMessage="Korisničko ime je obavezno!" />
                </div>

                <div class="form-row">
                    <h:outputLabel for="lozinka" value="Lozinka:" />
                    <h:inputSecret id="lozinka" value="#{registracijaKorisnika.lozinka}" required="true"
                                   requiredMessage="Lozinka je obavezna!" />
                </div>

                <div class="form-row">
                    <h:outputLabel for="ime" value="Ime:" />
                    <h:inputText id="ime" value="#{registracijaKorisnika.ime}" required="true"
                                 requiredMessage="Ime je obavezno!" />
                </div>

                <div class="form-row">
                    <h:outputLabel for="prezime" value="Prezime:" />
                    <h:inputText id="prezime" value="#{registracijaKorisnika.prezime}" required="true"
                                 requiredMessage="Prezime je obavezno!" />
                </div>

                <div class="form-row">
                    <h:outputLabel for="email" value="Email:" />
                    <h:inputText id="email" value="#{registracijaKorisnika.email}" required="true"
                                 requiredMessage="Email je obavezan!" />
                </div>
            </div>

            <h:commandButton value="Registriraj" action="#{registracijaKorisnika.registriraj}" styleClass="btn-submit" />

            <!-- Prikaz svih poruka na dnu forme -->
            <h:messages styleClass="error-message" layout="list" />
        </h:form>
    </ui:define>
</ui:composition>
